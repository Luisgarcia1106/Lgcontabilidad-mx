version: '3.8'

services:
  # Base de datos PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: lgcontabilidad_postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    networks:
      - lgcontabilidad_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lgcontabilidad_backend
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      SAT_API_KEY: ${SAT_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - ./backend/logs:/app/logs
    networks:
      - lgcontabilidad_network
    restart: unless-stopped

  # Frontend React
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lgcontabilidad_frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://backend:3001/api
      REACT_APP_ENV: development
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
    networks:
      - lgcontabilidad_network
    restart: unless-stopped

  # Redis para cache y sesiones (opcional)
  redis:
    image: redis:7-alpine
    container_name: lgcontabilidad_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - lgcontabilidad_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  lgcontabilidad_network:
    driver: bridge
